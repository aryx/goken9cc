# Build goken via docker.
# See also the Dockerfiles at the root of the project.

name: docker

on:
  pull_request_target: {}
  workflow_dispatch: null
  push:
    branches: [ master ]

jobs:
  build-via-mkrc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # No qemu-user-binfmt / binfmt_misc host registration needed anymore:
      # the Dockerfile installs qemu-user, and tests/*/mkfile call the
      # right qemu-xxx binary directly via scripts/qemu-runner instead of
      # relying on the kernel to auto-detect foreign binaries (that
      # registration was host-global, invisible from inside the
      # container, and picked the wrong emulator for mips).
      #- uses: docker/setup-buildx-action@v3
      - run: docker build -f Dockerfile --tag goken9cc --target build .
      - run: docker build -f Dockerfile --tag goken9cc-test --target test .
      - run: docker build -f Dockerfile --tag goken9cc-principia --target principia .

  build-golang:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # alt: make build-gosrc
      - run: docker build -f Dockerfile.golang .

  build-alpine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f Dockerfile.alpine .
